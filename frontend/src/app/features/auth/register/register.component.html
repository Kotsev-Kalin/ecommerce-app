<section class="container" style="padding: 2rem 0;">
  <div class="card" style="padding: 2rem; max-width: 520px; margin: 0 auto;">
    <h1 class="page-title">Create account</h1>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>First name</label>
      <input formControlName="firstName" type="text" style="width: 100%; margin: 0.5rem 0 1rem; padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <label>Last name</label>
      <input formControlName="lastName" type="text" style="width: 100%; margin: 0.5rem 0 1rem; padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <label>Email</label>
      <input formControlName="email" type="email" style="width: 100%; margin: 0.5rem 0 1rem; padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <label>Password</label>
      <input formControlName="password" type="password" style="width: 100%; margin: 0.5rem 0 1rem; padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <button type="submit" style="width: 100%; padding: 0.9rem; border: none; border-radius: 10px; background: #2563eb; color: white;">Register</button>
    </form>
  </div>
</section>
