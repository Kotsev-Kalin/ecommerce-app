<section class="container" style="padding: 2rem 0;">
  <h1 class="page-title">Admin Product Editor</h1>

  <div class="card" style="padding: 1.5rem; margin-bottom: 1.5rem;">
    <form [formGroup]="form" (ngSubmit)="save()" style="display: grid; gap: 0.75rem;">
      <input formControlName="name" type="text" placeholder="Product name" style="padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <textarea formControlName="description" rows="4" placeholder="Description" style="padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;"></textarea>
      <input formControlName="price" type="number" step="0.01" placeholder="Price" style="padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <input formControlName="imageUrl" type="text" placeholder="Image URL" style="padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <input formControlName="stockQuantity" type="number" placeholder="Stock quantity" style="padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <input formControlName="categoryName" type="text" placeholder="Category name" style="padding: 0.85rem; border-radius: 10px; border: 1px solid #d1d5db;">
      <label style="display: flex; gap: 0.5rem; align-items: center;">
        <input formControlName="active" type="checkbox">
        Active
      </label>
      <div style="display: flex; gap: 0.75rem;">
        <button type="submit" style="padding: 0.85rem 1rem; border: none; border-radius: 10px; background: #2563eb; color: white;">
          {{ editingId ? 'Update product' : 'Create product' }}
        </button>
        <button type="button" (click)="resetForm()" style="padding: 0.85rem 1rem; border: 1px solid #d1d5db; border-radius: 10px; background: white;">
          Reset
        </button>
      </div>
    </form>
  </div>

  <div class="card" style="padding: 1.5rem;">
    <table style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr>
          <th style="text-align: left; padding: 0.5rem;">Name</th>
          <th style="text-align: left; padding: 0.5rem;">Category</th>
          <th style="text-align: left; padding: 0.5rem;">Price</th>
          <th style="text-align: left; padding: 0.5rem;">Stock</th>
          <th style="text-align: left; padding: 0.5rem;">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products">
          <td style="padding: 0.5rem;">{{ product.name }}</td>
          <td style="padding: 0.5rem;">{{ product.categoryName }}</td>
          <td style="padding: 0.5rem;">{{ product.price | currency }}</td>
          <td style="padding: 0.5rem;">{{ product.stockQuantity }}</td>
          <td style="padding: 0.5rem;">
            <button type="button" (click)="edit(product)" style="margin-right: 0.5rem;">Edit</button>
            <button type="button" (click)="delete(product.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
