<section class="container page">
  <h1 class="page-title">Shopping Cart</h1>

  <div class="layout">
    <div class="card items">
      <div class="item" *ngFor="let item of items">
        <img [src]="item.product.imageUrl || 'https://via.placeholder.com/120x90?text=Item'" [alt]="item.product.name">
        <div class="item__info">
          <h3>{{ item.product.name }}</h3>
          <p>{{ item.product.price | currency }}</p>
        </div>
        <input type="number" min="1" [value]="item.quantity" (change)="updateQuantity(item, $any($event.target).value)">
        <button type="button" (click)="removeItem(item)">Remove</button>
      </div>
    </div>

    <aside class="card summary">
      <h2>Order Summary</h2>
      <p>Total items: {{ items.length }}</p>
      <p class="summary__total">Total: {{ total | currency }}</p>
      <button type="button" [disabled]="!items.length" (click)="goToCheckout()">Proceed to checkout</button>
    </aside>
  </div>
</section>
